<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigitalClock</title>
    <style>
      body{
        background-color: black;
      }
      .clock{
        color: lime;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translateX(-50%) translateY(-50%);
        border: 2px double lime;
        padding: 2rem;
        font-size: 2rem;
        font-family: orbitron;
        letter-spacing: .3rem;
      }
    </style>
  </head>
  <body>
    <div id="DigitalClock" class="clock"></div>
    <script type="text/javascript">
      function ShowTime() {
        var date = new Date();
        var h = date.getHours();
        var m = date.getMinutes();
        var s = date.getSeconds();
        var session = "AM";

        if (h == 0) {
          h = 12; //12 hour format
        }

        if (h > 12) {
          h = h - 12;
          session = "PM";
        }

        h = h < 10 ? "0" + h : h;
        m = m < 10 ? "0" + m : m;
        s = s < 10 ? "0" + s : s;

        document.getElementById("DigitalClock").innerHTML =
          h + ":" + m + ":" + s + "  " + session;

        setTimeout(ShowTime, 1000);
      }
      ShowTime();
    </script>
  </body>
</html>
